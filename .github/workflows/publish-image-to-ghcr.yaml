name: Publish image to GHCR

# SE EJECUTA CUANDO SE COMPLETA EL WORKFLOW DE CI PARA CONSTRUIR Y PROBAR LA APLICACIÓN PYTHON EN CADA PR HACIA MAIN, DE ESTA FORMA SOLO SE PUBLICA LA IMAGEN SI EL WORKFLOW DE CI HA SIDO EXITOSO, EVITANDO PUBLICAR IMÁGENES CON ERRORES.
on:
    workflow_run:
        workflows: ["Build, Test and Prepare Python App"]
        types:
            - completed
        branches:
            - main

# PERMISOS DENTRO DEL YAML PORQUE AL UTILIZAR UN $GITHUB_TOKEN ESTE ES NUEVO POR CADA EJECUCION EN GITHUB POR LO QUE DE ESTA FORMA LE DAMOS LOS PERMISOS NECESARIOS PARA PUBLICAR LA IMAGEN EN EL REGISTRO DE GHCR, SI SE UTILIZARA UN TOKEN PERSONAL ESTE DEBERIA TENER LOS PERMISOS DE MANERA EXTERNA.
permissions:
    actions: read
    contents: read
    packages: write

# VARIABLES DE ENTORNO PARA CONFIGURAR EL REGISTRO Y EL NOMBRE DE LA IMAGEN, EN ESTE CASO SE UTILIZA EL NOMBRE DEL REPOSITORIO DE GITHUB PARA LA IMAGEN, PERO SE PUEDE PERSONALIZAR.
env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    publish:
        if: ${{ github.event.workflow_run.actor.login != 'fluxcdbot'  && github.event.workflow_run.conclusion == 'success'}}
        runs-on: [self-hosted, linux, x64, podman, local]
        steps:
            # Necesario para obtener el archivo Dockerfile y el contexto de construccion, ademas de ser una buena practica para asegurarnos de que estamos trabajando con el codigo correcto.
            - uses: actions/checkout@v5

            - name: Download wheel artifact from CI workflow
              uses: actions/download-artifact@v5
              with:
                name: python-app-wheel
                path: dist
                github-token: ${{ secrets.GITHUB_TOKEN }}
                repository: ${{ github.repository }}
                run-id: ${{ github.event.workflow_run.id }}
            
            - name: List download files
              run: ls -la dist 

            - uses: docker/setup-buildx-action@v4
              with:
                driver: docker

            - uses: docker/login-action@v4
              with:
                registry: ${{ env.REGISTRY }}
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: Generate Flux image tag
              id: flux_tag
              run: |
                SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
                TS="$(date +%s)"
                IMAGE_TAG="main-${SHORT_SHA}-${TS}"
                echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
                echo "Generated image tag: ${IMAGE_TAG}"

            - id: meta
              uses: docker/metadata-action@v6
              with:
                images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                tags: |
                  type=raw,value=${{ steps.flux_tag.outputs.image_tag }}

            - uses: docker/build-push-action@v7
              with:
                context: .
                file: ./Dockerfile
                push: true
                tags: ${{ steps.meta.outputs.tags }}
                labels: ${{ steps.meta.outputs.labels }}