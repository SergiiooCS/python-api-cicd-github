# CI PARA CONSTRUIR Y PROBAR LA APLICACIÓN PYTHON EN CADA PR HACIA MAIN

name: Build, Test and Prepare Python App

on:
  pull_request:
    branches: [ main ]

jobs:
    ci-python-app:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python 3.12
              uses: actions/setup-python@v4
              with:
                python-version: '3.12'
            - name: Install dependencies
              run: |
                pip install -r requirements.txt

            - name: Install Flake8 for linting
              run: |
                pip install flake8

            - name: Run Flake8 Lint
              id: flake8
              continue-on-error: true
              run: |
                # fail if there are any flake8 errors
                flake8 ./app/main.py

            - name: Check if 'Lint with flake8' step failed
              if: steps.flake8.outcome != 'success'
              run: |
                echo "flake8 fails"
                exit 1

            - name: Run unit tests
              run: |
                python -m pytest -v ./tests/test_main.py

            - name: Install build tool
              run: python -m pip install build

            - name: Build Python package
              run: python -m build

                